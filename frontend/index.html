<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <!-- Single theme-color meta; populated at runtime from the active palette's
         --theme-color CSS var. The anti-flash script below seeds it before
         hydration so iOS PWA chrome doesn't flash a wrong color. -->
    <meta name="theme-color" content="#f8f1ed" />
    <link rel="icon" type="image/svg+xml" href="/icons/icon.svg" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <!-- Same-origin in dev (Vite proxies /api). In prod, /api is behind the
         same Caddy host, so a plain dns-prefetch hint is the right shape. -->
    <link rel="preconnect" href="/" crossorigin />
    <link rel="dns-prefetch" href="/" />
    <title>Journaling Guru</title>
    <!-- Anti-flash: read theme + palette preference and apply class/attribute
         before React hydrates. Mirrors the strategy next-themes documents for
         class-attribute mode, extended with a data-palette attribute that our
         CSS overrides key off. The seed theme-color values mirror each
         palette's --theme-color (kept in sync with src/styles/index.css). -->
    <script>
      (function () {
        try {
          var stored = localStorage.getItem("theme");
          var prefersDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
          var mode = stored === "light" || stored === "dark"
            ? stored
            : prefersDark ? "dark" : "light";
          if (mode === "dark") document.documentElement.classList.add("dark");

          document.documentElement.setAttribute("data-palette", "ember");

          var seed = mode === "dark" ? "#14110f" : "#f8f1ed";
          var meta = document.querySelector('meta[name="theme-color"]');
          if (meta) meta.setAttribute("content", seed);
        } catch (e) {}
      })();
    </script>
  </head>
  <body class="bg-background text-foreground antialiased font-sans">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
