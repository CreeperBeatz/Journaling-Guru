services:
  postgres:
    image: postgres:16-alpine
    container_name: journai-postgres
    environment:
      POSTGRES_USER: journai
      POSTGRES_PASSWORD: journai
      POSTGRES_DB: journai
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U journai -d journai"]
      interval: 2s
      timeout: 3s
      retries: 30

volumes:
  postgres-data:
